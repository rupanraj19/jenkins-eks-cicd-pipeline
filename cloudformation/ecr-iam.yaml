AWSTemplateFormatVersion: '2010-09-09'
Description: ECR Repository and IAM role for Jenkins CI/CD pipeline

Resources:

  # ECR Repository to store Docker images
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: flask-cicd-app
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Project
          Value: jenkins-eks-cicd

  # IAM Policy for Jenkins to push to ECR
  JenkinsECRPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: JenkinsECRAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
            Resource: '*'

Outputs:
  ECRRepositoryURI:
    Description: ECR Repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/flask-cicd-app"

  ECRRepositoryName:
    Description: ECR Repository Name
    Value: !Ref ECRRepository